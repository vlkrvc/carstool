services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: carstool
      POSTGRES_PASSWORD: carstool
      POSTGRES_DB: carstool
    ports:
      - "55432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  adminer:
    image: adminer
    ports:
      - "8080:8080"
volumes:
  db_data:
